  alternatives:
    - Genome Research
    - Molecular Biology and Evolution

research_question: >
  Do SNVs, INDELs, and SVs produce concordant or discordant signals of
  population structure, differentiation, and evolutionary history across 26
  human populations from the 1000 Genomes Project high-coverage panel? We
  hypothesize that if variant types reflect the same demographic history,
  their signals should be concordant; systematic discordance would indicate
  variant-type-specific evolutionary forces. We quantify concordance using
  Procrustes analysis of PCA spaces, FST correlation across population pairs,
  and SFS shape comparison. When discordances occur, we test whether they
  reflect (a) variant-type-specific selection pressures, (b) mutation rate
  differences, or (c) differential sensitivity to demographic processes.

confirmed_by_user: true
