# Research Anchor — Phase 0
# Generated: 2026-02-28

domain: Population Genetics / Human Genomics
subdomain: Comparative population genomics of human genetic variation
research_type: D  # Discovery — data-driven biological insights

expert_persona:
  role: Senior Population Geneticist
  specialty: Human evolutionary genetics and global genetic diversity
  years_experience: 15+
  typical_venues:
    - Nature Genetics
    - American Journal of Human Genetics
    - Genome Research
    - PLOS Genetics
