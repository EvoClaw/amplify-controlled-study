reviewer_focus:
  - Mechanism chains linking observations to biological processes
  - Alternative explanation exclusion (drift vs selection vs demography)
  - Batch effects and technical artifacts in sequencing data
  - Population structure confounds
  - Multiple testing correction
  - Biological plausibility of findings
  - Appropriate demographic model assumptions
  - Reproducibility of computational analyses

